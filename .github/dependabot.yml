version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    groups:
      astro-and-starlight:
        patterns:
          - "astro"
          - "@astrojs/*"
        update-types:
          - minor
          - patch
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      dev-tools:
        patterns:
          - "typescript"
          - "@types/*"
          - "prettier"
    commit-message:
      prefix: "deps"
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Etc/UTC
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
