name: Scrape — global sources

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      source:
        description: 'Single source slug to scrape (blank = all global sources)'
        required: false
        default: ''

concurrency:
  group: scrape-global
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Scrape all global regulations & frameworks
        # Runs every adapter in the `global` group:
        #   nist-ai-rmf, eu-ai-act, uk-ico, iso-iec-42001
        # A per-source failure is logged but does not block the rest.
        if: ${{ github.event_name == 'schedule' || github.event.inputs.source == '' }}
        run: pnpm --filter @aigov/pipeline run-group global

      - name: Scrape single source (manual dispatch only)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source != '' }}
        env:
          SOURCE: ${{ github.event.inputs.source }}
        run: pnpm --filter @aigov/pipeline run-source "$SOURCE"
      - name: Update heartbeat
        run: |
          mkdir -p .heartbeat
          cat > .heartbeat/last-run-scrape-global.json <<EOF
          {
            "source": "scrape-global",
            "lastRun": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "ok": true,
            "expectedCadence": "weekly (Sun 03:00 UTC)"
          }
          EOF
      - name: Open PR if snapshots changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes — skipping PR creation"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Include a short commit-sha suffix on the branch name so a re-run on
          # the same day doesn't collide with a previously-pushed branch.
          BRANCH="scrape/global-$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)"
          git checkout -b "$BRANCH"
          git add apps/site/src/content/regulations/ .heartbeat/
          git commit -m "data(global): weekly scrape $(date -u +%Y-%m-%d)"
          git push -u origin "$BRANCH"
          # PR creation needs "Allow GitHub Actions to create and approve pull
          # requests" enabled at Settings → Actions → General. If that's off,
          # log the manual link instead of failing the whole run — the branch
          # is already pushed, so the maintainer can open the PR by clicking.
          if ! gh pr create \
              --title "data(global): weekly scrape $(date -u +%Y-%m-%d)" \
              --body "Automated scrape PR. Review the diff before merging — the meaningful-diff filter has already discarded whitespace and trivial edits." \
              --label "scrape,scope-global" \
              --base main 2>&1 | tee /tmp/pr-output.log
          then
            echo ""
            echo "::warning::Could not open PR automatically — open it manually:"
            echo "::warning::  https://github.com/${{ github.repository }}/pull/new/$BRANCH"
            echo ""
            cat /tmp/pr-output.log
          fi
