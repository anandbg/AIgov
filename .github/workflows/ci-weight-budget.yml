name: CI — weight budget

on:
  pull_request:
    paths:
      - 'apps/site/**'
      - 'packages/shared/**'
      - 'scripts/check-weight-budget.mjs'
      - '.github/workflows/ci-weight-budget.yml'
  workflow_dispatch:

concurrency:
  group: ci-weight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  weight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build site
        run: pnpm --filter @aigov/site build
      - name: Check weight budgets
        run: pnpm weight-budget
