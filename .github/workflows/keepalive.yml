name: Keepalive

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: keepalive
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - name: Update heartbeat
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p .heartbeat
          cat > .heartbeat/last-run-keepalive.json <<EOF
          {
            "source": "keepalive",
            "lastRun": "$TIMESTAMP",
            "ok": true,
            "expectedCadence": "weekly (Mon 06:00 UTC)"
          }
          EOF
      - name: Commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .heartbeat/last-run-keepalive.json
          if git diff --staged --quiet; then
            echo "No heartbeat change — running anyway to register Action activity"
            git commit --allow-empty -m "chore(keepalive): weekly empty commit per Pitfall 4 — $(date -u +%Y-%m-%d)"
          else
            git commit -m "chore(keepalive): update heartbeat $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          git push
