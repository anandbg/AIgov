name: CI — chat refusal fixtures (CHT-09)

on:
  pull_request:
    paths:
      - 'apps/chat-worker/**'
      - 'scripts/check-injection-refusal.mjs'
      - '.github/workflows/ci-injection-refusal.yml'
  workflow_dispatch:

concurrency:
  group: ci-injection-refusal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  injection-refusal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Run injection-refusal check
        run: node ./scripts/check-injection-refusal.mjs
